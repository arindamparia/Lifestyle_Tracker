<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ──────────────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Identity ─────────────────────────────────────────────────────── -->
    <title>LifeStyle Tracker</title>
    <meta name="description" content="Daily habit, workout, nutrition and hydration tracker" />

    <!-- ── Favicon ──────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- ── Fonts (Syne + JetBrains Mono — used by PWA banner) ──────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- ── PWA: theme & status bar ──────────────────────────────────────── -->
    <!-- Android Chrome: tab / address bar colour -->
    <meta name="theme-color" content="#0a0b0f" />

    <!-- iOS Safari: add-to-home-screen behaviour -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tracker" />

    <!-- iOS home-screen icon (SVG is supported on iOS 14.7+) -->
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- ── PWA: manifest (vite-plugin-pwa also injects this at build) ───── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── SW: reload page when a new service worker takes control ─────── -->
    <script>
      if ('serviceWorker' in navigator) {
        var _swReloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (!_swReloading) { _swReloading = true; window.location.reload(); }
        });
      }
    </script>

    <!-- ── Prevent black flash ──────────────────────────────────────────── -->
    <!-- Sets the background BEFORE React hydrates so there is no white/black flicker -->
    <style>
      html, body { margin: 0; background-color: #07080a; }
    </style>
    <script>
      (function () {
        var h = new Date().getHours();
        var bg =
          h >= 5 && h < 9  ? '#120e15' :
          h >= 9 && h < 16 ? '#0a0f16' :
          h >= 16 && h < 19 ? '#140a16' :
          '#07080a';
        document.documentElement.style.backgroundColor = bg;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Deploy version check — standalone, not bundled with main app -->
    <script type="module" src="/version-check.js"></script>
  </body>
</html>
